<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-density="regular">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>鑫安车险 · 从车风险数据平台</title>
<script>
  /* Swallow the benign "ResizeObserver loop" browser notification (fires on responsive SVG/layout reflow; not a crash). */
  window.addEventListener("error", function(e){
    if(e && e.message && e.message.indexOf("ResizeObserver loop") !== -1){ e.stopImmediatePropagation(); e.preventDefault(); }
  }, true);
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#ED1C24;
    --accent-soft:color-mix(in srgb, #ED1C24 11%, transparent);
    --font:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
    --mono:"IBM Plex Mono","Consolas",monospace;

    --band-low:#00AF66; --band-mid:#E1A300; --band-high:#FF8200; --band-crit:#ED1C24;

    /* light theme surfaces */
    --bg:#eef1f4;
    --surface:#ffffff;
    --surface-2:#f4f6f9;
    --border:#e4e8ee;
    --ink:#16202b;
    --ink-2:#56636f;
    --ink-3:#909aa6;
    --sidebar-bg:#11161b;
    --sidebar-ink:#aeb8c2;
    --sidebar-ink-3:#6c7884;
    --shadow:0 1px 2px rgba(20,30,45,.04), 0 2px 10px rgba(20,30,45,.05);

    --gap:16px; --card-pad:18px; --canvas-pad:24px; --radius:14px;
  }
  html[data-theme="dark"]{
    --bg:#0c1116;
    --surface:#151c24;
    --surface-2:#1b232d;
    --border:#28323d;
    --ink:#eef2f6;
    --ink-2:#a3b1bf;
    --ink-3:#6d7a87;
    --sidebar-bg:#0a0e12;
    --sidebar-ink:#a3b1bf;
    --sidebar-ink-3:#5f6b77;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 2px 12px rgba(0,0,0,.35);
  }
  html[data-density="compact"]{ --gap:11px; --card-pad:13px; --canvas-pad:18px; }
  html[data-density="comfy"]{ --gap:22px; --card-pad:24px; --canvas-pad:32px; }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:var(--font);
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  #root{ height:100%; }
  ::selection{ background:var(--accent); color:#fff; }

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }

  /* ---- shell ---- */
  .app-shell{ display:grid; grid-template-columns:230px 1fr; height:100%; }
  html[data-density="compact"] .app-shell{ grid-template-columns:208px 1fr; }

  .sidebar{
    background:var(--sidebar-bg); color:var(--sidebar-ink);
    display:flex; flex-direction:column; padding:20px 14px;
    overflow-y:auto;
  }
  .brand-block{ display:flex; align-items:center; gap:12px; padding:4px 8px 22px; }
  .brand-kicker{ width:7px; height:38px; background:var(--accent); border-radius:2px; flex:0 0 auto; }
  .brand-cn{ font-size:19px; font-weight:900; color:#fff; letter-spacing:1px; }
  .brand-en{ font-size:10px; font-weight:600; color:var(--sidebar-ink-3); letter-spacing:2.5px; margin-top:2px; }

  .nav{ display:flex; flex-direction:column; gap:19px; flex:1; }
  .nav-group{ display:flex; flex-direction:column; gap:2px; }
  .nav-sec{
    display:flex; align-items:baseline; justify-content:space-between; gap:8px;
    padding:2px 11px 9px;
  }
  .nav-sec-cn{ font-size:11px; font-weight:800; letter-spacing:.16em;
    color:color-mix(in srgb, var(--sidebar-ink) 56%, var(--sidebar-ink-3)); }
  .nav-sec-en{ font-family:var(--mono); font-size:8px; font-weight:600; letter-spacing:.22em;
    color:var(--sidebar-ink-3); opacity:.66; white-space:nowrap; }
  .nav-item{
    display:flex; align-items:center; gap:12px; width:100%;
    padding:9px 11px; border:none; background:transparent; cursor:pointer;
    border-radius:10px; color:var(--sidebar-ink); font-family:inherit;
    font-size:14px; font-weight:600; letter-spacing:.02em; text-align:left;
    transition:background .16s, color .16s, box-shadow .16s; position:relative;
  }
  .nav-item svg{ flex:0 0 auto; opacity:.74; transition:opacity .16s; }
  .nav-item:hover{ background:rgba(255,255,255,.055); color:#fff; }
  .nav-item:hover svg{ opacity:1; }
  .nav-item.active{ background:var(--accent); color:#fff; font-weight:700;
    box-shadow:0 6px 16px -5px color-mix(in srgb, var(--accent) 58%, transparent); }
  .nav-item.active svg{ opacity:1; }
  .nav-item span{ white-space:nowrap; }

  .sidebar-foot{ padding:14px 10px 4px; border-top:1px solid rgba(255,255,255,.08); margin-top:14px; }
  .foot-platform{ font-size:12.5px; font-weight:700; color:var(--sidebar-ink); }
  .foot-note{ font-size:11px; color:var(--sidebar-ink-3); margin-top:3px; }

  .main{ display:flex; flex-direction:column; min-width:0; height:100%; }
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:20px;
    padding:16px var(--canvas-pad); background:var(--surface);
    border-bottom:1px solid var(--border); flex:0 0 auto;
  }
  .top-title{ font-size:20px; font-weight:900; color:var(--ink); letter-spacing:.01em; }
  .top-vehicle{ color:var(--accent); }
  .top-sub{ font-size:12.5px; color:var(--ink-3); margin-top:2px; white-space:nowrap; }
  .top-right{ display:flex; align-items:center; gap:12px; flex:0 0 auto; }
  .pill{ display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:var(--ink-2); white-space:nowrap;
    background:var(--surface-2); border:1px solid var(--border); padding:7px 13px; border-radius:999px; }
  .pill .dot{ width:7px; height:7px; border-radius:50%; background:var(--band-low);
    box-shadow:0 0 0 3px color-mix(in srgb, var(--band-low) 22%, transparent); animation:livePulse 2.4s ease-out infinite; }
  .period{ font-size:12.5px; font-weight:600; color:var(--ink-2); background:var(--surface-2); white-space:nowrap;
    border:1px solid var(--border); padding:7px 13px; border-radius:9px; }
  .avatar{ width:34px; height:34px; border-radius:50%; background:var(--accent); color:#fff;
    display:grid; place-items:center; font-weight:800; font-size:14px; flex:0 0 auto; }
  .userchip{ display:flex; align-items:center; gap:9px; }
  .userchip .un{ font-size:13px; font-weight:800; color:var(--ink); line-height:1.2; white-space:nowrap; }
  .userchip .ur{ font-size:11px; color:var(--ink-3); line-height:1.2; white-space:nowrap; }

  .canvas{ flex:1; overflow-y:auto; padding:var(--canvas-pad); }

  /* ---- table row hover ---- */
  .row-hover:hover{ background:var(--surface-2); }

  /* ---- inline table download button ---- */
  .dl-btn{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--border); background:var(--surface);
    color:var(--ink-2); font-family:inherit; font-size:12px; font-weight:700; padding:7px 12px; border-radius:8px;
    cursor:pointer; transition:all .14s; white-space:nowrap; }
  .dl-btn:hover{ border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
  .dl-btn:active{ transform:translateY(1px); }
  .dl-btn.sm{ padding:5px 10px; font-size:11.5px; }
  .dl-btn svg{ flex:0 0 auto; }

  /* ---- detail / compare sliders ---- */
  input[type=range].detail-slider{
    -webkit-appearance:none; appearance:none; width:100%; height:8px; border-radius:5px; outline:none; cursor:pointer;
    background:linear-gradient(90deg, var(--track-accent, var(--accent)) var(--pct,50%), var(--surface-2) var(--pct,50%));
    border:1px solid var(--border);
  }
  input[type=range].detail-slider::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:22px; height:22px; border-radius:50%;
    background:#fff; border:4px solid var(--track-accent, var(--accent));
    box-shadow:0 2px 6px rgba(0,0,0,.22); cursor:pointer; margin-top:-1px;
  }
  input[type=range].detail-slider::-moz-range-thumb{
    width:20px; height:20px; border-radius:50%; background:#fff;
    border:4px solid var(--track-accent, var(--accent)); box-shadow:0 2px 6px rgba(0,0,0,.22); cursor:pointer;
  }

  /* scrollbars */
  .canvas::-webkit-scrollbar, .sidebar::-webkit-scrollbar, .card::-webkit-scrollbar{ width:10px; height:10px; }
  .canvas::-webkit-scrollbar-thumb, .card::-webkit-scrollbar-thumb{ background:var(--border); border-radius:6px; border:2px solid var(--bg); background-clip:content-box; }
  .sidebar::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.12); border-radius:6px; }

  select{ font-family:inherit; }
  button{ font-family:inherit; }

  /* ---- 启动屏（首屏加载感知优化）---- */
  #splash{
    position:fixed; inset:0; z-index:99; display:grid; place-items:center;
    background:#11161b; transition:opacity .35s ease;
  }
  #splash .sp-inner{ display:flex; flex-direction:column; align-items:center; gap:18px; }
  #splash .sp-brand{ display:flex; align-items:center; gap:13px; }
  #splash .sp-kicker{ width:8px; height:42px; background:#ED1C24; border-radius:2px; }
  #splash .sp-cn{ font-size:23px; font-weight:900; color:#fff; letter-spacing:2px; font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif; }
  #splash .sp-en{ font-size:10px; font-weight:600; color:#6c7884; letter-spacing:3px; margin-top:3px; font-family:"Noto Sans SC",sans-serif; }
  #splash .sp-bar{ width:170px; height:3px; border-radius:2px; background:#28323d; overflow:hidden; }
  #splash .sp-bar i{ display:block; width:40%; height:100%; border-radius:2px; background:#ED1C24; animation:spSlide 1.1s ease-in-out infinite; }
  @keyframes spSlide{ 0%{ transform:translateX(-100%);} 100%{ transform:translateX(420%);} }
  /* ---- 集团总览：克制入场 / 实时脉动 ---- */
  @keyframes gScan{ 0%{ transform:translateX(-130%);} 100%{ transform:translateX(620%);} }
  @keyframes gPulse{ 0%,100%{ opacity:.85; transform:scale(1);} 50%{ opacity:.18; transform:scale(2.2);} }
  @keyframes gBlink{ 0%,100%{ opacity:1;} 50%{ opacity:.45;} }
  /* ---- 移动端：通知入场 / 推送脉冲 / 实时心跳 ---- */
  @keyframes mIn{ 0%{ opacity:0; transform:translateY(10px) scale(.99);} 100%{ opacity:1; transform:translateY(0) scale(1);} }
  @keyframes mPing{ 0%{ box-shadow:0 0 0 0 rgba(237,28,36,.5);} 70%{ box-shadow:0 0 0 8px rgba(237,28,36,0);} 100%{ box-shadow:0 0 0 0 rgba(237,28,36,0);} }
  @keyframes mFloat{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-3px);} }
  @keyframes mShimmer{ 0%{ background-position:-200% 0;} 100%{ background-position:200% 0;} }
  @keyframes livePulse{ 0%{ box-shadow:0 0 0 0 color-mix(in srgb, var(--band-low) 50%, transparent);} 70%{ box-shadow:0 0 0 8px color-mix(in srgb, var(--band-low) 0%, transparent);} 100%{ box-shadow:0 0 0 0 color-mix(in srgb, var(--band-low) 0%, transparent);} }
</style>
</head>
<body>
<div id="root"></div>
<div id="splash">
  <div class="sp-inner">
    <div class="sp-brand">
      <div class="sp-kicker"></div>
      <div>
        <div class="sp-cn">鑫安车险</div>
        <div class="sp-en">从车风险数据平台</div>
      </div>
    </div>
    <div class="sp-bar"><i></i></div>
  </div>
</div>

    <circle cx="50" cy="50" r="4" fill="#ED1C24"/>
  </svg>
</template>
